name: Update Profile Stats Card

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  update-svg:
    name: Update SVG stats card
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_USERNAME: ahmersdev
        run: python today.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git diff --quiet --cached || git commit -m "Update stats card [automated]"
          git push
