<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <style>
    .title-bar { fill: #21252b; }
    .window-bg { fill: #1e2127; }
    .prompt { fill: #56d364; font-size: 15px; }
    .cmd { fill: #c9d1d9; font-size: 15px; }
    .label { fill: #8b949e; font-size: 13px; }
    .value { fill: #79c0ff; font-size: 13px; font-weight: bold; }
    .accent { fill: #f778ba; font-size: 13px; }
    .cursor { fill: #56d364; }
    .titletext { fill: #8b949e; font-size: 13px; }
    .caption { fill: #8b949e; font-size: 11px; font-style: italic; }
  </style>

  <rect x="0" y="0" width="860" height="460" rx="10" class="window-bg"/>
  <rect x="0" y="0" width="860" height="34" rx="10" class="title-bar"/>
  <rect x="0" y="24" width="860" height="10" class="title-bar"/>

  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="17" r="6" fill="#27c93f"/>
  <text x="430.0" y="22" text-anchor="middle" class="titletext">ahmer@github: ~</text>

  <!-- Left panel: ASCII avatar -->
  <text x="28" y="60" class="prompt">$ <tspan class="cmd">cat avatar.txt</tspan></text>
  <text x="35" y="100.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.:::::&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="112.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;:....:..:...&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="125.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;::..:......:...&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="137.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;:...:=+++=--:...&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="150.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;..:*#%%%%%%#*-.:&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="162.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;:.=##%%%%%%%#=..&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="175.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;.=++++#%*++*=.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="187.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;:=*++**#*+++=:&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="200.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;==+##%#######++&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="212.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;*=#%%*#*#%%#++&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="225.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;==*#*=+=*##*=-&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="237.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;=++++**==+=&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="250.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;-+*===*=-=&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="262.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;--:--::-==.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="275.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;:++=-=+#*--:&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="287.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;:-:+*#####===-:::&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="300.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;&#160;&#160;&#160;.::::---=*####*====-::::::&#160;&#160;&#160;&#160;&#160;</text>
  <text x="35" y="312.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;&#160;::...:-----=*####-----::.:::::::&#160;&#160;</text>
  <text x="35" y="325.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;&#160;:.....:::-===*%%#=:....::::::::::::</text>
  <text x="35" y="337.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;::.::::....::-*%+-::::::::::::::::::</text>
  <text x="35" y="350.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;&#160;::::::::.::..--=--::::::::::::::::::</text>
  <text x="35" y="362.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;:.::::::::::::-=-==::::::::::::::::::</text>
  <text x="35" y="375.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">&#160;::::::::::::::====:::::::::::::::::::</text>
  <text x="35" y="387.5" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">:::::::.:::::::=+=-:::::::::::::::::::</text>
  <text x="35" y="400.0" font-family="Courier New, monospace"  class="cmd" style="font-size: 10px; letter-spacing: 1px;" xml:space="preserve">:.::::.::::::::=++:::::::::::.::::::::</text>

  <!-- Divider -->
  <line x1="330" y1="44" x2="330" y2="440" stroke="#30363d" stroke-width="1"/>

  <!-- Right panel: live stats -->
  <text x="352" y="60" class="prompt">$ <tspan class="cmd">whoami</tspan></text>
  <text x="352" y="82" class="cmd">{{FULL_NAME}} &#8212; {{TAGLINE}}</text>

  <text x="352" y="114" class="prompt">$ <tspan class="cmd">cat stats.txt</tspan></text>
  <text x="352" y="140" class="label">Repositories       <tspan class="value">{{REPOS}}</tspan></text>
  <text x="352" y="162" class="label">Total Commits      <tspan class="value">{{COMMITS}}</tspan></text>
  <text x="352" y="184" class="label">Stars Earned       <tspan class="value">{{STARS}}</tspan></text>
  <text x="352" y="206" class="label">Followers          <tspan class="value">{{FOLLOWERS}}</tspan></text>
  <text x="352" y="228" class="label">Lines of Code      <tspan class="accent">+{{LINES_ADDED}}</tspan><tspan class="label">, </tspan><tspan fill="#f85149">-{{LINES_DELETED}}</tspan></text>

  <text x="352" y="260" class="prompt">$ <tspan class="cmd">cat tech_stack.txt</tspan></text>
  <text x="352" y="282" class="label">{{TECH_LINE_1}}</text>
  <text x="352" y="302" class="label">{{TECH_LINE_2}}</text>

  <text x="352" y="334" class="prompt">$ <tspan class="cmd">cat contact.txt</tspan></text>
  <text x="352" y="356" class="label">email:     <tspan class="value">{{EMAIL}}</tspan></text>
  <text x="352" y="376" class="label">linkedin:  <tspan class="value">{{LINKEDIN}}</tspan></text>
  <text x="352" y="396" class="label">portfolio: <tspan class="value">{{PORTFOLIO}}</tspan></text>

  <text x="352" y="428" class="prompt">$ <tspan class="cursor">&#9612;</tspan>
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </text>

  <text x="840" y="448" text-anchor="end" class="titletext" font-size="11">updated {{LAST_UPDATED}}</text>
</svg>
